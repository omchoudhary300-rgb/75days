<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>75 Days 🔥 — NIOS PCM Warrior</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #0a0a0f; color: #f0f0f8; min-height: 100vh; }

.header {
background: linear-gradient(135deg,#0a0a0f,#1a0a1f,#0a0a0f);
border-bottom: 1px solid #2a2a3a;
padding: 18px 16px 14px;
position: sticky; top: 0; z-index: 100;
}
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.title-text {
font-size: 36px; font-weight: 900; letter-spacing: 2px;
background: linear-gradient(135deg,#ff6b35,#ffd166);
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
background-clip: text; line-height: 1;
}
.title-sub { font-size: 10px; color: #666680; letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }

.ring-wrap { text-align: center; position: relative; width: 64px; }
.ring-wrap svg { transform: rotate(-90deg); }
.ring-number { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: 20px; font-weight: 900; color: #ffd166; line-height: 1; }
.ring-label { font-size: 8px; color: #666680; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }

.habit-pills { display: flex; gap: 7px; flex-wrap: wrap; }
.habit-pill {
display: flex; align-items: center; gap: 5px;
background: #16161f; border: 1px solid #2a2a3a; border-radius: 20px;
padding: 4px 10px; font-size: 11px;
}
.dot { width: 6px; height: 6px; border-radius: 50%; }
.saving-pill {
display: flex; align-items: center; gap: 5px;
background: rgba(6,214,160,0.1); border: 1px solid rgba(6,214,160,0.3);
border-radius: 20px; padding: 4px 10px; font-size: 11px; color: #06d6a0;
}

.tabs {
display: flex; gap: 4px; padding: 10px 16px 0;
border-bottom: 1px solid #2a2a3a; background: #0a0a0f;
position: sticky; top: 132px; z-index: 99;
}
.tab-btn {
font-family: monospace; font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
padding: 8px 14px; border-radius: 8px 8px 0 0; cursor: pointer; white-space: nowrap;
border: 1px solid transparent; border-bottom: none;
background: transparent; color: #666680; transition: all 0.15s;
}
.tab-btn.active {
border: 1px solid #2a2a3a; border-bottom: 1px solid #111118;
background: #111118; color: #f0f0f8; margin-bottom: -1px;
}

/* TRACKER */
#tab-tracker { padding: 12px 8px; overflow-x: auto; }
table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 480px; }
thead th {
font-family: monospace; font-size: 9px; letter-spacing: 2px; color: #666680;
padding: 8px 6px; background: #111118; border-bottom: 1px solid #2a2a3a; text-align: center;
}
thead th:first-child { text-align: left; padding-left: 12px; }
.week-row td { padding: 10px 0 2px 12px; }
.week-label { font-family: monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: #ff6b35; opacity: 0.7; }
.day-row td { border-bottom: 1px solid rgba(42,42,58,0.4); padding: 6px 4px; text-align: center; }
.day-row td:first-child { padding-left: 12px; text-align: left; }
.day-num { font-size: 17px; font-weight: 800; line-height: 1; }
.day-date { font-size: 9px; color: #444460; font-family: monospace; }
.habit-box {
width: 32px; height: 32px; border-radius: 8px; margin: auto; cursor: pointer;
border: 2px solid #2a2a3a; background: transparent;
display: flex; align-items: center; justify-content: center;
font-size: 15px; font-weight: 700; transition: all 0.15s;
}
.fire-cell { font-size: 18px; }

/* STUDY */
#tab-study { padding: 14px; }
.study-banner {
background: rgba(255,107,53,0.1); border: 1px solid rgba(255,107,53,0.3);
border-radius: 12px; padding: 12px 14px; margin-bottom: 16px;
display: flex; align-items: center; gap: 12px;
}
.study-banner-icon { font-size: 24px; }
.study-banner-title { font-weight: 800; font-size: 14px; color: #ffd166; letter-spacing: 1px; }
.study-banner-sub { font-size: 11px; color: #666680; margin-top: 2px; }
.study-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 12px; }
.study-card { background: #16161f; border: 1px solid #2a2a3a; border-radius: 14px; padding: 14px; }
.study-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.study-card-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 17px; }
.study-card-title { font-weight: 700; font-size: 14px; }
.study-card-sub { font-size: 10px; color: #666680; }
.task-list { display: flex; flex-direction: column; gap: 6px; }
.task-item {
display: flex; align-items: center; gap: 8px; padding: 8px 10px;
background: #111118; border-radius: 8px; cursor: pointer;
}
.task-check {
width: 20px; height: 20px; border-radius: 5px; flex-shrink: 0;
border: 2px solid #2a2a3a; background: transparent;
display: flex; align-items: center; justify-content: center;
font-size: 11px; color: #000; font-weight: 700; transition: all 0.15s;
}
.task-check.done { border-color: #06d6a0; background: #06d6a0; }
.task-text { font-size: 12px; font-weight: 500; flex: 1; }
.task-text.done { text-decoration: line-through; color: #555570; }
.task-time { font-size: 10px; color: #444460; font-family: monospace; white-space: nowrap; }

/* STATS */
#tab-stats { padding: 14px; }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.stat-card { background: #16161f; border: 1px solid #2a2a3a; border-radius: 14px; padding: 14px 10px; text-align: center; }
.stat-num {
font-size: 32px; font-weight: 900;
background: linear-gradient(135deg,#ff6b35,#ffd166);
-webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1;
}
.stat-label { font-size: 9px; color: #666680; letter-spacing: 1px; text-transform: uppercase; font-family: monospace; margin-top: 4px; }
.heatmap-label { font-weight: 700; font-size: 16px; color: #666680; letter-spacing: 2px; margin-bottom: 12px; }
.heatmap { display: grid; grid-template-columns: repeat(15, 1fr); gap: 4px; }
.heatmap-cell {
aspect-ratio: 1; border-radius: 4px; background: #16161f;
border: 1px solid #2a2a3a;
display: flex; align-items: center; justify-content: center;
font-size: 8px; color: #555570; font-family: monospace;
}

.hidden { display: none !important; }
</style>

</head>
<body>

<!-- HEADER -->

<div class="header">
  <div class="header-top">
    <div>
      <div class="title-text">75 DAYS 🔥</div>
      <div class="title-sub">NIOS Class 12 PCM • 25 Mar – 7 Jun</div>
    </div>
    <div class="ring-wrap">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="26" fill="none" stroke="#2a2a3a" stroke-width="5"/>
        <circle id="progress-ring" cx="32" cy="32" r="26" fill="none" stroke="url(#g1)" stroke-width="5"
          stroke-linecap="round" stroke-dasharray="163.4" stroke-dashoffset="163.4"/>
        <defs>
          <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ff6b35"/>
            <stop offset="100%" stop-color="#ffd166"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="ring-number" id="ring-num">0</div>
      <div class="ring-label">DONE</div>
    </div>
  </div>
  <div class="habit-pills" id="habit-pills-container"></div>
</div>

<!-- TABS -->

<div class="tabs">
  <button class="tab-btn active" onclick="setTab('tracker')">📋 Tracker</button>
  <button class="tab-btn" onclick="setTab('study')">📚 Study</button>
  <button class="tab-btn" onclick="setTab('stats')">📊 Stats</button>
</div>

<!-- TRACKER TAB -->

<div id="tab-tracker">
  <div style="overflow-x:auto;">
    <table id="tracker-table">
      <thead>
        <tr>
          <th style="text-align:left;padding-left:12px;">DAY</th>
          <th>🚫🍭<div style="font-size:8px;margin-top:2px;">No Sugar</div></th>
          <th>🚫🍟<div style="font-size:8px;margin-top:2px;">No Junk</div></th>
          <th>👟<div style="font-size:8px;margin-top:2px;">8-10K Steps</div></th>
          <th>🌅<div style="font-size:8px;margin-top:2px;">Early Rise</div></th>
          <th>ALL</th>
        </tr>
      </thead>
      <tbody id="tracker-body"></tbody>
    </table>
  </div>
</div>

<!-- STUDY TAB -->

<div id="tab-study" class="hidden">
  <div class="study-banner">
    <span class="study-banner-icon">🧠</span>
    <div>
      <div class="study-banner-title">NIOS BOARD — PCM WARRIOR!</div>
      <div class="study-banner-sub">Tick karo, aage badho — ek din ek kaam</div>
    </div>
  </div>
  <div class="study-grid" id="study-grid"></div>
</div>

<!-- STATS TAB -->

<div id="tab-stats" class="hidden">
  <div class="stats-grid" id="stats-grid"></div>
  <div class="heatmap-label">75-DAY HEATMAP</div>
  <div class="heatmap" id="heatmap"></div>
</div>

<script>
const HABITS = [
  { key: "sugar", label: "No Sugar", emoji: "🚫🍭", color: "#ff6b35" },
  { key: "junk",  label: "No Junk",  emoji: "🚫🍟", color: "#ef476f" },
  { key: "steps", label: "8-10K Steps", emoji: "👟",  color: "#ffd166" },
  { key: "rise",  label: "Early Rise", emoji: "🌅",  color: "#118ab2" },
];

const STUDY_DATA = [
  { icon:"📐", color:"#4cc9f0", title:"Mathematics (311)", sub:"NIOS Class 12", tasks:[
    { t:"Relations & Functions — theory + examples", time:"40 min" },
    { t:"Calculus — Differentiation / Integration", time:"45 min" },
    { t:"Matrices & Determinants — numericals", time:"35 min" },
    { t:"NIOS TMA / Prev year MCQs (15 qs)", time:"30 min" },
  ]},
  { icon:"⚡", color:"#06d6a0", title:"Physics (312)", sub:"NIOS Class 12", tasks:[
    { t:"Electrostatics / Current Electricity — read", time:"40 min" },
    { t:"Formulas list banao & yaad karo", time:"20 min" },
    { t:"Numerical practice (10 qs)", time:"35 min" },
    { t:"Ray Optics / Wave Optics — diagrams", time:"20 min" },
  ]},
  { icon:"🧪", color:"#c77dff", title:"Chemistry (313)", sub:"NIOS Class 12", tasks:[
    { t:"Solid State / Solutions / Electrochemistry", time:"35 min" },
    { t:"Organic Chemistry — reactions & mechanisms", time:"40 min" },
    { t:"Chemical equations balance practice", time:"20 min" },
    { t:"NIOS sample paper MCQs (10 qs)", time:"20 min" },
  ]},
  { icon:"✍️", color:"#ff6b35", title:"English (302)", sub:"NIOS Class 12", tasks:[
    { t:"Reading Comprehension passage (1)", time:"20 min" },
    { t:"Letter / Essay / Notice writing practice", time:"25 min" },
    { t:"Grammar — tenses, voice, narration", time:"20 min" },
    { t:"10 new vocabulary / idioms", time:"15 min" },
  ]},
  { icon:"📋", color:"#ffd166", title:"NIOS TMA Work", sub:"Submit karna hai!", tasks:[
    { t:"TMA question solve karo (1-2 qs)", time:"45 min" },
    { t:"NIOS SLM — 1 lesson read karo", time:"30 min" },
    { t:"On Demand Exam practice paper", time:"40 min" },
  ]},
  { icon:"🔁", color:"#f72585", title:"Daily Revision", sub:"Sab subjects thoda thoda", tasks:[
    { t:"Morning — PCM formulas & key points revise", time:"20 min" },
    { t:"Flashcards — Chemistry reactions / Maths", time:"15 min" },
    { t:"Weekly mock test (1 full subject paper)", time:"90 min" },
  ]},
];

// ---- Storage ----
let appData = {};

function storageKey() { return "habits_75days"; }

function saveData() {
  try { localStorage.setItem(storageKey(), JSON.stringify(appData)); } catch(e){}
}

function loadData() {
  try {
    const raw = localStorage.getItem(storageKey());
    if (raw) appData = JSON.parse(raw);
  } catch(e){}
}

// ---- Helpers ----
function getDayDate(dayNum) {
  const d = new Date(2025, 2, 25);
  d.setDate(d.getDate() + dayNum - 1);
  return d.toLocaleDateString("en-IN", { day:"2-digit", month:"short" });
}

function getDoneCount(day) {
  const row = appData[`d${day}`] || {};
  return HABITS.filter(h => row[h.key]).length;
}

function isAllDone(day) { return getDoneCount(day) === 4; }

function getPerfectDays() {
  let count = 0;
  for (let d = 1; d <= 75; d++) if (isAllDone(d)) count++;
  return count;
}

function getStreak() {
  let streak = 0;
  for (let d = 75; d >= 1; d--) {
    if (isAllDone(d)) streak++; else break;
  }
  return streak;
}

function getTotalChecks() {
  let total = 0;
  for (let d = 1; d <= 75; d++) total += getDoneCount(d);
  return total;
}

// ---- Tab switching ----
let currentTab = "tracker";

function setTab(id) {
  currentTab = id;
  document.querySelectorAll(".tab-btn").forEach((b, i) => {
    b.classList.toggle("active", ["tracker","study","stats"][i] === id);
  });
  ["tracker","study","stats"].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle("hidden", t !== id);
  });
  if (id === "stats") renderStats();
}

// ---- Render Header Pills ----
function renderPills() {
  const container = document.getElementById("habit-pills-container");
  container.innerHTML = "";
  HABITS.forEach(h => {
    const pill = document.createElement("div");
    pill.className = "habit-pill";
    pill.innerHTML = `<div class="dot" style="background:${h.color}"></div>${h.emoji} ${h.label}`;
    container.appendChild(pill);
  });
}

// ---- Render ring ----
function updateRing() {
  const perfect = getPerfectDays();
  const pct = perfect / 75;
  const circumference = 163.4;
  document.getElementById("progress-ring").setAttribute("stroke-dashoffset", circumference - circumference * pct);
  document.getElementById("ring-num").textContent = perfect;
}

// ---- Tracker ----
function renderTracker() {
  const tbody = document.getElementById("tracker-body");
  tbody.innerHTML = "";

  for (let day = 1; day <= 75; day++) {
    // Week separator
    if ((day - 1) % 7 === 0) {
      const weekRow = document.createElement("tr");
      weekRow.className = "week-row";
      const td = document.createElement("td");
      td.colSpan = 6;
      td.innerHTML = `<span class="week-label">— WEEK ${Math.ceil(day / 7)} —</span>`;
      weekRow.appendChild(td);
      tbody.appendChild(weekRow);
    }

    const count = getDoneCount(day);
    const all = count === 4;
    const rowData = appData[`d${day}`] || {};

    const tr = document.createElement("tr");
    tr.className = "day-row";
    tr.style.background = all ? "rgba(6,214,160,0.04)" : "transparent";

    // Day cell
    const dayTd = document.createElement("td");
    const dayColor = all ? "#06d6a0" : count > 0 ? "#f0f0f8" : "#555570";
    dayTd.innerHTML = `<div class="day-num" style="color:${dayColor}">D${String(day).padStart(2,"0")}</div><div class="day-date">${getDayDate(day)}</div>`;
    tr.appendChild(dayTd);

    // Habit boxes
    HABITS.forEach(h => {
      const td = document.createElement("td");
      const checked = rowData[h.key] || false;
      const box = document.createElement("div");
      box.className = "habit-box";
      box.style.border = `2px solid ${checked ? h.color : "#2a2a3a"}`;
      box.style.background = checked ? `${h.color}25` : "transparent";
      box.style.color = h.color;
      box.style.boxShadow = checked ? `0 0 8px ${h.color}44` : "none";
      box.textContent = checked ? "✓" : "";
      box.addEventListener("click", () => toggleHabit(day, h.key, box, h, tr));
      td.appendChild(box);
      tr.appendChild(td);
    });

    // Fire cell
    const fireTd = document.createElement("td");
    fireTd.className = "fire-cell";
    fireTd.style.opacity = all ? "1" : "0.12";
    fireTd.textContent = all ? "🔥" : "○";
    fireTd.id = `fire-${day}`;
    tr.appendChild(fireTd);

    tbody.appendChild(tr);
  }
}

function toggleHabit(day, habitKey, box, habit, tr) {
  const k = `d${day}`;
  if (!appData[k]) appData[k] = {};
  appData[k][habitKey] = !appData[k][habitKey];
  saveData();

  const checked = appData[k][habitKey];
  box.style.border = `2px solid ${checked ? habit.color : "#2a2a3a"}`;
  box.style.background = checked ? `${habit.color}25` : "transparent";
  box.style.boxShadow = checked ? `0 0 8px ${habit.color}44` : "none";
  box.textContent = checked ? "✓" : "";

  // Update row & fire
  const count = getDoneCount(day);
  const all = count === 4;
  tr.style.background = all ? "rgba(6,214,160,0.04)" : "transparent";
  const dayNum = tr.querySelector(".day-num");
  dayNum.style.color = all ? "#06d6a0" : count > 0 ? "#f0f0f8" : "#555570";
  const fire = document.getElementById(`fire-${day}`);
  if (fire) { fire.style.opacity = all ? "1" : "0.12"; fire.textContent = all ? "🔥" : "○"; }

  updateRing();
}

// ---- Study ----
function renderStudy() {
  const grid = document.getElementById("study-grid");
  grid.innerHTML = "";

  STUDY_DATA.forEach((card, ci) => {
    const cardEl = document.createElement("div");
    cardEl.className = "study-card";

    const header = `
      <div class="study-card-header">
        <div class="study-card-icon" style="background:${card.color}22">${card.icon}</div>
        <div>
          <div class="study-card-title" style="color:${card.color}">${card.title}</div>
          <div class="study-card-sub">${card.sub}</div>
        </div>
      </div>`;

    const taskList = document.createElement("div");
    taskList.className = "task-list";

    card.tasks.forEach((task, ti) => {
      const done = appData[`s${ci}_${ti}`] || false;
      const item = document.createElement("div");
      item.className = "task-item";

      const check = document.createElement("div");
      check.className = `task-check${done ? " done" : ""}`;
      check.textContent = done ? "✓" : "";

      const text = document.createElement("span");
      text.className = `task-text${done ? " done" : ""}`;
      text.textContent = task.t;

      const time = document.createElement("span");
      time.className = "task-time";
      time.textContent = task.time;

      item.appendChild(check);
      item.appendChild(text);
      item.appendChild(time);

      item.addEventListener("click", () => {
        const k = `s${ci}_${ti}`;
        appData[k] = !appData[k];
        saveData();
        const isDone = appData[k];
        check.className = `task-check${isDone ? " done" : ""}`;
        check.textContent = isDone ? "✓" : "";
        text.className = `task-text${isDone ? " done" : ""}`;
      });

      taskList.appendChild(item);
    });

    cardEl.innerHTML = header;
    cardEl.appendChild(taskList);
    grid.appendChild(cardEl);
  });
}

// ---- Stats ----
function renderStats() {
  const perfect = getPerfectDays();
  const streak = getStreak();
  const pct = Math.round((perfect / 75) * 100);
  const total = getTotalChecks();

  const statsData = [
    { num: perfect, label: "Perfect Days" },
    { num: streak, label: "Streak 🔥" },
    { num: `${pct}%`, label: "Complete" },
    { num: 75 - perfect, label: "Remaining" },
    { num: total, label: "Total ✓" },
    { num: 75, label: "Total Days" },
  ];

  const grid = document.getElementById("stats-grid");
  grid.innerHTML = "";
  statsData.forEach(s => {
    const card = document.createElement("div");
    card.className = "stat-card";
    card.innerHTML = `<div class="stat-num">${s.num}</div><div class="stat-label">${s.label}</div>`;
    grid.appendChild(card);
  });

  // Heatmap
  const heatmap = document.getElementById("heatmap");
  heatmap.innerHTML = "";
  const bgs = ["#16161f","rgba(6,214,160,0.15)","rgba(6,214,160,0.35)","rgba(6,214,160,0.55)","rgba(6,214,160,0.85)"];
  for (let day = 1; day <= 75; day++) {
    const score = getDoneCount(day);
    const cell = document.createElement("div");
    cell.className = "heatmap-cell";
    cell.style.background = bgs[score];
    cell.style.border = `1px solid ${score > 0 ? "rgba(6,214,160,0.3)" : "#2a2a3a"}`;
    cell.style.color = score === 4 ? "#000" : "#555570";
    cell.textContent = day;
    heatmap.appendChild(cell);
  }
}

// ---- Init ----
loadData();
renderPills();
updateRing();
renderTracker();
renderStudy();
</script>

</body>
</html>
